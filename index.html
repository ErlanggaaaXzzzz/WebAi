<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErlanggaAi - ChatGPT Premium System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0b0f19;
      --bg-sidebar: #111827;
      --panel-glass: rgba(22, 28, 45, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --user-bubble: #1e1b4b;
      --ai-bubble: #1f2937;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 280px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: all 0.3s ease; z-index: 100; }
    .sidebar-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.25rem; color: #fff; }
    .brand-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 8px; }
    .btn-new-chat { margin: 16px; padding: 12px; background: transparent; border: 1px solid var(--border-color); border-radius: 12px; color: #fff; cursor: pointer; text-align: left; font-weight: 500; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .btn-new-chat:hover { background: rgba(255,255,255,0.05); border-color: var(--primary); }
    .history-container { flex: 1; overflow-y: auto; padding: 0 12px; }
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; font-size: 0.9rem; color: var(--text-muted); transition: all 0.2s; group; }
    .history-item:hover, .history-item.active { background: rgba(255,255,255,0.05); color: #fff; }
    .history-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .history-actions { display: none; gap: 6px; }
    .history-item:hover .history-actions { display: flex; }
    .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; }
    .action-btn:hover { color: #fff; }
    .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .user-info { font-weight: 500; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { background: none; border: none; color: #f87171; cursor: pointer; font-weight: 600; }
    .logout-btn:hover { text-decoration: underline; }

    /* Main Chat Area */
    .chat-area { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; background: var(--bg-main); }
    .mobile-header { display: none; padding: 14px 20px; border-bottom: 1px solid var(--border-color); justify-content: space-between; align-items: center; background: var(--bg-sidebar); }
    .menu-toggle { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    
    .messages-wrapper { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 24px; }
    .message-row { display: flex; width: 100%; max-width: 850px; margin: 0 auto; gap: 20px; }
    .message-row.user { justify-content: flex-end; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }
    .avatar.user { background: #4338ca; color: #fff; }
    .avatar.ai { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; }
    .bubble { max-width: calc(100% - 60px); padding: 14px 20px; border-radius: 18px; line-height: 1.6; font-size: 0.98rem; word-break: break-word; }
    .message-row.user .bubble { background-color: var(--user-bubble); border-top-right-radius: 4px; color: #fff; }
    .message-row.ai .bubble { background-color: var(--ai-bubble); border-top-left-radius: 4px; border: 1px solid var(--border-color); color: #e5e7eb; }

    /* Markdown styling inside bubble */
    .bubble p { margin-bottom: 12px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code { background: rgba(0,0,0,0.4); padding: 3px 6px; border-radius: 6px; font-family: monospace; font-size: 0.9rem; }
    .code-container { margin: 14px 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); background: #0d1117; font-family: monospace; }
    .code-header { background: #161b22; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
    .copy-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; }
    .copy-btn:hover { color: #fff; }
    .code-container pre { padding: 16px; overflow-x: auto; font-size: 0.9rem; color: #c9d1d9; line-height: 1.4; }

    /* Skeleton Loading & Typing Animation */
    .skeleton-line { height: 12px; background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%); background-size: 200% 100%; animation: loadingSkeleton 1.5s infinite; border-radius: 6px; margin-bottom: 10px; }
    .skeleton-line:last-child { width: 60%; margin-bottom: 0; }
    @keyframes loadingSkeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .typing-dots { display: flex; gap: 5px; align-items: center; height: 24px; }
    .dot { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: pulse 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }

    /* Input Controls Panel */
    .input-panel { padding: 24px 20px; background: linear-gradient(180deg, transparent 0%, var(--bg-main) 20%); }
    .input-container { max-width: 850px; margin: 0 auto; position: relative; background: var(--panel-glass); border: 1px solid var(--border-color); border-radius: 16px; backdrop-filter: blur(12px); display: flex; align-items: flex-end; padding: 10px 14px; }
    .input-container:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
    .chat-textarea { flex: 1; background: transparent; border: none; resize: none; outline: none; color: #fff; font-size: 1rem; max-height: 200px; min-height: 24px; padding: 4px 10px; line-height: 1.5; box-sizing: border-box; }
    .control-actions { display: flex; align-items: center; gap: 12px; margin-left: 10px; }
    .action-circle-btn { width: 38px; height: 38px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
    .btn-send { background: var(--primary); color: white; }
    .btn-send:hover { background: var(--primary-hover); }
    .btn-send:disabled { background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: not-allowed; }
    .btn-stop { background: #ef4444; color: white; display: none; }
    .btn-stop:hover { background: #dc2626; }
    .btn-clear { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border-color); border-radius: 10px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; max-width: 850px; margin: 0 auto 8px auto; display: block; text-align: right; }
    .btn-clear:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; }

    /* Toast Notification */
    .toast { position: fixed; top: 24px; right: -400px; padding: 16px 24px; border-radius: 12px; color: white; font-weight: 500; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: right 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 1100; background: #ef4444; }
    .toast.show { right: 24px; }

    /* Mobile Responsive Layout */
    @media (max-width: 768px) {
      .sidebar { position: absolute; left: -280px; top: 0; bottom: 0; }
      .sidebar.open { left: 0; }
      .mobile-header { display: flex; }
      .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 90; backdrop-filter: blur(4px); }
      .overlay.show { display: block; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon"></div>
        <span>ErlanggaAi</span>
      </div>
    </div>
    <button class="btn-new-chat" id="btnNewChat">
      <span>+</span> Baru Percakapan
    </button>
    <div class="history-container" id="historyContainer">
      </div>
    <div class="sidebar-footer">
      <div class="user-info" id="usernameDisplay">User</div>
      <button class="logout-btn" id="btnLogout">Keluar</button>
    </div>
  </aside>

  <main class="chat-area">
    <div class="mobile-header">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="brand" style="font-size:1.1rem;">ErlanggaAi</div>
      <div style="width:24px;"></div>
    </div>

    <div class="messages-wrapper" id="messagesWrapper">
      </div>

    <div class="input-panel">
      <button class="btn-clear" id="btnClearChat">Bersihkan Pesan</button>
      <div class="input-container">
        <textarea class="chat-textarea" id="chatInput" rows="1" placeholder="Tanyakan apa saja ke ErlanggaAi... (Enter kirim, Shift+Enter baris baru)"></textarea>
        <div class="control-actions">
          <button class="action-circle-btn btn-stop" id="btnStop" title="Stop Generation">■</button>
          <button class="action-circle-btn btn-send" id="btnSend" disabled title="Kirim">➔</button>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toastNotification"></div>

  <script src="script.js"></script>
</body>
</html>
